version: '3.8'
services:
  tweet-bot:
    build: .
    restart: unless-stopped
    environment:
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      X_API_KEY: "${X_API_KEY}"
      X_API_SECRET: "${X_API_SECRET}"
      X_ACCESS_TOKEN: "${X_ACCESS_TOKEN}"
      X_ACCESS_TOKEN_SECRET: "${X_ACCESS_TOKEN_SECRET}"
    volumes:
      - ./logs:/app/logs
    ports:
      - "8080:8080" 
